<div id="awc-canvas-wrapper" style="font-family: 'Segoe UI', Verdana, sans-serif; max-width: 1000px; margin: 20px auto; width: 100%; font-size: 1.1rem; line-height: 1.6; color: #1a1a1a; border: 1px solid #e1e4e8; border-radius: 8px; overflow: hidden; background-color: #ffffff;">
    <header style="background-color: #ba0c2f; padding: 40px 25px; border-bottom: 6px solid #2CCCD3; text-align: center;">
        <h2 style="margin: 0; color: #ffffff; font-size: clamp(1.5rem, 5vw, 2.2rem); border: none; line-height: 1.2;">$title$</h2>
        <p style="margin: 10px 0 0 0; color: #eafffd; font-size: 1.1rem; font-style: italic;">$subtitle$</p>
    </header>
    <div class="awc-content-body" style="padding: 30px 40px;">
$body$
    </div>
</div>
