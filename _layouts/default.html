<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | WPE Department</title>

    <link rel="stylesheet" href="/coach-alan.github.io/assets/css/style.css">

    <style>
        /* Immediate Bento Visuals */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            margin: 10px 0;
            border: none;
            background-color: #002D72;
            color: white !important;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        @media (max-width: 600px) {
            .bento-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    {{ content }}
    <hr>
    <footer>© 2026 Wellness & Physical Education (WPE) Department</footer>
</body>

</html>
