<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | WPE Department</title>
    <link rel="stylesheet" href="https://unpkg.com/just-the-docs@0.17.1/dist/just-the-docs.default.css">
    <style>
        body {
            background-color: #fdfcf8;
            color: #002D72;
            font-family: sans-serif;
            padding: 20px;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            margin: 10px 0;
        }

        .btn-blue {
            background-color: #002D72;
            color: white !important;
        }

        .btn-green {
            background-color: #007A33;
            color: white !important;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .bento-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    {{ content }}
    <hr>
    <footer>© 2026 Wellness & Physical Education (WPE) Department</footer>
</body>

</html>
