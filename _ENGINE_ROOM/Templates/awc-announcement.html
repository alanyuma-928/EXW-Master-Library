<!-- Interactive Styles: Course Footer High-Contrast Protocol -->
<style>
    #exw-standard-footer a:focus, 
    #exw-standard-footer a:focus-visible {
        outline: 3px solid #2CCCD3 !important;
        outline-offset: 4px !important;
        background-color: #2CCCD3 !important;
        color: #1a1a1a !important;
        box-shadow: 0 0 15px rgba(44, 204, 211, 0.5) !important;
    }
    #exw-standard-footer a:hover {
        background-color: #ffffff !important;
        color: #7c0920 !important;
        border-color: #ffffff !important;
        text-decoration: underline !important;
    }
    #exw-standard-footer section a:focus {
        outline: 2px solid #ffffff !important;
        background-color: #ffffff !important;
        color: #7c0920 !important;
    }
</style>

<div id="awc-announcement-wrapper" style="font-family: 'Segoe UI', Verdana, sans-serif; max-width: 800px; margin: 0 auto; border: 1px solid #e1e4e8; border-radius: 8px; overflow: hidden;">
    <header style="background-color: #ba0c2f; padding: 20px; border-bottom: 4px solid #2CCCD3; text-align: center;">
        <h2 style="margin: 0; color: #ffffff; font-size: 1.5rem;">🎙️ $title$</h2>
    </header>
    
    <div style="padding: 20px; background-color: #f9f9f9; text-align: center;">
        <p style="margin-bottom: 15px; font-style: italic; color: #555;">Listen to the "Architect's Briefing" before starting the module.</p>
        <audio controls style="width: 100%; max-width: 400px;">
            <source src="$audio_url$" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>

    <div style="padding: 25px; line-height: 1.6; color: #1a1a1a;">
        $body$
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        <p style="text-align: center;">
            <a href="$module_url$" style="background-color: #ba0c2f; color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold;">🏗️ Enter Module</a>
        </p>
    </div>
</div>
